name = "Daily learning triage"
prompt = '''Act as the daily learning triage automation. This is the classification/clustering phase only, not the implementation phase. This automation is invoked separately for each configured cwd; operate on the current working directory only. Do not inspect, report on, write to, or regenerate dashboards for sibling configured repos. If the current working directory does not have docs/learnings/, report that this repo is not initialized and stop.

First read the canonical global learning-system contract at /Users/david/Dropbox (Personal)/code/dotfiles/docs/ai/learning-system.md; when the current repo also has docs/ai/learning-system.md, read that as a repo-specific supplement.

At the start, run git status --short and record baseline dirty paths. Proceed with useful non-overlapping work even when the repo is already dirty. Do not touch or stage those baseline dirty paths; if the only useful action overlaps a baseline dirty file, choose another useful action or report that specific overlap.

In the current repo, inspect docs/learnings/inbox.md, candidates.md, calibration.md, auto-actions.md, decisions.jsonl, and raw evidence docs referenced by open entries. Use the Abstraction Ladder as a clustering tool, not a per-bug writing exercise: preserve raw bug samples until there is enough evidence for sample-backed clusters, then climb to the highest still-actionable principle. Do not manufacture one guidance line per bug. A single incident may become a candidate only when it is high-risk or has an obvious prevention surface. Before creating or updating an entry, check the last five active learnings and same-run/session evidence to avoid duplicates.

Store prevention work as one readable field, for example `Prevention artifacts: docs (required), test (required), skill (proposed)`; required means needed to prevent recurrence, proposed means worth considering. Merge duplicate evidence into existing entries, archive obvious non-durable/test-data-only/stale entries, add candidate action notes or draft-plan requests for clear prevention artifacts, and regenerate docs/learnings/dashboard.md and dashboard.html. Do not edit product code, tests, helpers, global instructions, or broad docs. Low-risk learning-file edits and candidate/draft notes are allowed. Append plain-English audit lines to docs/learnings/auto-actions.md for every action.

Verify automation-owned changes with git diff --check -- <paths changed by this automation> and any focused checks that are not polluted by baseline dirt. If verification fails because of automation changes, fix the failure and rerun verification. If files changed and verification passed, stage only files changed by this automation and create one local commit such as `docs(learnings): apply daily triage`; report the commit hash. Do not push. Do not leave a successful run dirty.

The dashboard is optional calibration, not a daily approval gate. Do not ask the user to do a daily review. Do not attempt to serve a live dashboard from this automation — the sandbox blocks binding 127.0.0.1. End the report with what changed, the local commit hash or skip reason, anything genuinely needing a product decision, and a short optional note that `learn live` is available at http://127.0.0.1:60000 for calibration when wanted.'''
status = "ACTIVE"
