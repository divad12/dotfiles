name = "Daily learning triage"
prompt = "Act as the daily learning triage automation. This is the classification/clustering phase only, not the implementation phase. This automation is invoked separately for each configured cwd; operate on the current working directory only. Do not inspect, report on, write to, or regenerate dashboards for sibling configured repos. If the current working directory does not have docs/learnings/, report that this repo is not initialized and stop. First read the canonical global learning-system contract at /Users/david/Dropbox (Personal)/code/dotfiles/docs/ai/learning-system.md; when the current repo also has docs/ai/learning-system.md, read that as a repo-specific supplement. In the current repo, inspect docs/learnings/inbox.md, candidates.md, calibration.md, auto-actions.md, decisions.jsonl, and raw evidence docs referenced by open entries. Explicitly apply the Abstraction Ladder from the learning-system contract: start with specific incidents, climb to the highest still-actionable principle, and use that principle to semantically cluster related learnings into durable pattern-level entries. Before creating or updating an entry, check the last five active learnings and same-run/session evidence to avoid duplicates. Store prevention work as one readable field, for example `Prevention artifacts: docs (required), test (required), skill (proposed)`; required means needed to prevent recurrence, proposed means worth considering. Merge duplicate evidence into existing entries, archive obvious non-durable/test-data-only/stale entries, add candidate action notes or draft-plan requests for clear prevention artifacts, and regenerate docs/learnings/dashboard.md and dashboard.html. Do not edit product code, tests, helpers, global instructions, or broad docs. Low-risk learning-file edits and candidate/draft notes are allowed. Append plain-English audit lines to docs/learnings/auto-actions.md for every action. Do not attempt to serve a live dashboard from this automation — the sandbox blocks binding 127.0.0.1. End the report with a one-liner telling the user to run `learn live` in a terminal tab whenever they want to review (the URL stays at http://127.0.0.1:60000). If the user says `done` in the triage thread, run the executor phase immediately for the current repo, append a same-day audit marker such as `manual-executor-ran: YYYY-MM-DD`, regenerate the dashboard, and tell the user the scheduled 9pm executor can skip this repo. End with a concise summary for the current repo only: clusters found, entries merged/archived, candidate actions prepared, the `learn live` reminder, and items left for executor or human review."
status = "ACTIVE"
rrule = "FREQ=DAILY;BYHOUR=17;BYMINUTE=0;BYSECOND=0"
model = "gpt-5.5"
reasoning_effort = "high"
execution_environment = "local"
